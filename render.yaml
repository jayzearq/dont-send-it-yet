services:
  - type: web
    name: dont-send-it-yet
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: SITE_URL
        value: https://dont-send-it-yet.onrender.com
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
